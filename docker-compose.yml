
services:
  backend:
    build: ./backend
    container_name: burhan_backend
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env.example
    depends_on:
      - db
      - redis

  db:
    image: postgres:16
    container_name: burhan_db
    environment:
      POSTGRES_DB: burhan_db
      POSTGRES_USER: burhan_user
      POSTGRES_PASSWORD: burhan_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: burhan_redis
    ports:
      - "6379:6379"

volumes:
  postgres_data: